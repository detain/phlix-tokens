# @phlix/tokens — CI
#
# Deterministic gate: regenerate tokens (must be a no-op vs the committed
# artifact), typecheck, build, and run the full vitest suite. Runs on every push
# to master and on pull requests, plus manual dispatch.
name: tokens-ci

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      # The generated tokens must match what's committed — fail the build if the
      # CSS changed without regenerating.
      - run: npm run generate
      - name: Verify generated tokens are up to date
        run: git diff --exit-code -- src/tokens.generated.ts src/tokens.generated.json
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # The committed dist/ artifacts (incl. dist/tokens.json) must match a fresh
      # build — fail if a stale dist was committed.
      - name: Verify committed dist is up to date
        run: git diff --exit-code -- dist
      - run: npm run test:run
